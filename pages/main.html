<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="style/pageAccueil.css"/>
        <link rel="stylesheet" href="style/post.css"/>
        <link rel="stylesheet" href="style/commentaire.css"/>
    </head>
    <body>

        <header class="forum-header">
            <a href="/" class="forum-logo">Le super FORUM</a>
            <form class="forum-fils" action='http://localhost:8080/ChangerDeFilDeDiscution' method='get'>
                <button name="iD_fil_de_discussion" value="1" type="submit">fil 1</button>
                <button name="iD_fil_de_discussion" value="2" type="submit">fil 2</button>
            </form>
            <div class="forum-auth">
                {{if .EstConnecte}}
                <span class="forum-pseudo">{{.NomUtilisateur}}</span>
                <form action='http://localhost:8080/Deconnexion' method='get'>
                    <button class="btn-header btn-deconnexion" type="submit">Se déconnecter</button>
                </form>
                {{else}}
                <a href="/Accueil" class="btn-header btn-connexion">Se connecter</a>
                <a href="/Accueil?vue=inscription" class="btn-header btn-inscription">S'inscrire</a>
                {{end}}
            </div>
        </header>

        <div id="warning-invite" class="warning-invite">
            <span>Vous naviguez en tant qu'invité — vous ne pouvez pas liker, commenter ou poster sans compte.</span>
            <div class="warning-actions">
                <a href="/Accueil" class="btn-warning-lien">Se connecter</a>
                <a href="/Accueil?vue=inscription" class="btn-warning-lien btn-warning-inscription">S'inscrire</a>
                <button class="btn-warning-fermer" onclick="document.getElementById('warning-invite').style.display='none'">✕</button>
            </div>
        </div>

        <main>
        </main>
        <div class="block"></div>

        <script>
            var estConnecte = {{if .EstConnecte}}true{{else}}false{{end}};
            if (!estConnecte) {
                setTimeout(function() {
                    document.getElementById("warning-invite").style.display = "flex";
                }, 10 * 60 * 1000);
            }
        </script>
    </body>
</html>
