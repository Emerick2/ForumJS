<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="URF8"/>
        <title>Inscription | Forusky</title>
        <link rel="stylesheet" href="../style/pageAccueil.css"/> 
        <link rel="stylesheet" href="../style/post.css"/> 
        <link rel="stylesheet" href="../style/commentaire.css"/> 
        <link rel="stylesheet" href="../style/barre-de-recherche.css"/> 
        <link rel="stylesheet" href="../style/pageConnexion.css"/>
    </head>
    <body>
        <header>
            <h1>Forusky</h1>
            <div class="liste-boutons">
                <form action='http://localhost:8080/AllerSurLaPageAccueil' method='get'>
                    <button name="pageDemandé" value="main.html" type="submit">Accueil</button>
                </form>
                <form action='http://localhost:8080/ChangerPage' method='get'>
                    <button name="pageDemandé" value="inscription.html" type="submit">inscription</button>
                </form>
                <form action='http://localhost:8080/ChangerPage' method='get'>
                    <button name="pageDemandé" value="nouveau-sujet.html" type="submit">Créé un sujet</button>
                </form>
                <form action='http://localhost:8080/ChangerPageSpéciale' method='get'>
                    <button name="pageDemandé" value="TableauDeBord" type="submit">Tableau de bord</button>
                </form>
            </div>

            <br>
            <button name="iD_fil_de_discussion" value="1" type="submit">file 1</button>
            <button name="iD_fil_de_discussion" value="2" type="submit">file 2</button>
            <button name="iD_fil_de_discussion" value="8" type="submit">file 8</button>
            <br><br>
            <form id="barre-de-recherche" action='http://localhost:8080/BarreDeRecherche' method='get'>
                <input name="Recherche" placeholder="Rechercher...">
                <button id="imageEnvoyerRecherche" type="submit">
                    <img src="../images/chercher.svg">
                </button>
            </form>
            <br>
        </header>
        <main>
            <h2>Vous avez un compte ?<br/>Alors, connectez vous !</h2>
            <form class="partieInscription" action='http://localhost:8080/Connexion' method='get'>
                <label for="email">E-Mail</label>
                <input name="email" type="email" placeholder="Votre e-mail" minlength="3"><br/>
                <label for="password">Mot de passe</label>
                <input name="password" type="password" minlength="8" placeholder="Votre mot de passe"><br/>
                <button type="submit">Connexion</button>
            </form>
            <!-- <hr> -->
            <br/><br/>
            <h2>Vous n'avez pas de compte ?<br/>Alors, créé en un !</h2>
            <form class="partieInscription" action='http://localhost:8080/Inscription' method='get'>
                <label for="email">E-Mail</label>
                <input name="email" type="email" placeholder="Votre e-mail" minlength="3"><br/>
                <label for="password">Mot de passe</label>
                <input name="password" type="password" minlength="8" placeholder="Votre mot de passe"><br/>
                <label for="nomUtilisateur">Nom d'utilisateur</label>
                <input name="nomUtilisateur" type="text" minlength="3" placeholder="Votre nom"><br/>
                <button type="submit">Inscription</button>
            </form>
            <br/><br/>
            <h2>Vous ête connecter et vous voulez vous déconnectez ?<br/>Alors, déconnectez-vous !</h2>
            <form class="partieInscription" action='http://localhost:8080/Deconexion' method='get'>
                <button type="submit">Déconnexion</button>
            </form>
        </main>
    </body>
</html>
