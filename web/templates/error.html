{{define "title"}}Erreur {{.ErrCode}} — Forum{{end}}

{{define "content"}}
<div class="error-page" role="main">
  <div class="error-code" aria-hidden="true">{{.ErrCode}}</div>
  <h1>
    {{if eq .ErrCode 404}}Page introuvable
    {{else if eq .ErrCode 403}}Accès interdit
    {{else if eq .ErrCode 400}}Requête invalide
    {{else}}Erreur serveur{{end}}
  </h1>
  <p>{{.Error}}</p>
  <a href="/" class="btn btn-primary">Retour à l'accueil</a>
</div>
{{end}}
